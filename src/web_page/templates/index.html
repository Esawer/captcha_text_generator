<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
<h1>Login Page</h1>
{% if msg %}
<script>
    alert("Failure, please try again.")
</script>
{% endif %}
<form action="/login" method="POST" autocomplete="off">

    <div>
        <input type="text" id="login" name="u_login" placeholder="Login">
    </div>

    <div>
        <input type="password" id="pwd" name="u_password" placeholder="Password">
    </div>

    <input type="hidden" name="r_number" value="{{r_number}}">

    <button type="submit" class="login-button">Log in</button>


    <div style="margin-bottom: 10px;">
        <img src="{{ url_for('static', filename='captcha_images/' + 'img_'+r_number+'.jpg') }}" alt="Captcha">
</div>

<div class="captcha-row">
    <div>
        <input type="text" id="captcha" name="u_captcha" placeholder="Captcha">
    </div>
</div>
</form>

<form action="/login" method="POST" autocomplete="off" class="captcha-row">
        <button type="submit" name="action" class="refresh-button" value="refresh">Refresh</button>
</form>

<div class="bottom-line">
    Igor Wróblewski
</div>
</body>
</html>
